<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Vortex - Curso de TI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .curso {
      display: none;
      padding: 20px;
    }

    .modulo {
      background: #1e293b;
      padding: 20px;
      margin: 10px 0;
      border-radius: 10px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
  <div class="box">
    <h2>🔐 Vortex</h2>

    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">

    <button onclick="login()">Entrar</button>
    <button onclick="register()">Cadastrar</button>
  </div>
</div>

<!-- CURSO -->
<div class="curso" id="cursoBox">

  <h1>🚀 VORTEX - Curso de TI</h1>

  <div class="modulo">📚 Fundamentos</div>
  <div class="modulo">🧠 Lógica de Programação</div>
  <div class="modulo">🐍 Python</div>
  <div class="modulo">🗄️ Banco de Dados</div>
  <div class="modulo">🌐 Desenvolvimento Web</div>
  <div class="modulo">🔐 Segurança</div>

  <button onclick="logout()">Sair</button>

</div>

<script>
  function register() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    localStorage.setItem(user, pass);
    alert("Cadastrado com sucesso!");
  }

  function login() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    let saved = localStorage.getItem(user);

    if (saved === pass) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("cursoBox").style.display = "block";
    } else {
      alert("Usuário ou senha incorretos");
    }
  }

  function logout() {
    location.reload();
  }
</script>

</body>
</html>
