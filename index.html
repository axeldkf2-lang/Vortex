<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Vortex</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* LOGIN */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1e293b;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #22c55e;
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

/* CURSO */
.curso {
  display: none;
  padding: 20px;
}

.modulo {
  background: #1e293b;
  padding: 20px;
  margin: 10px 0;
  border-radius: 10px;
}

.aulas {
  display: none;
  margin-top: 10px;
}

.aula {
  background: #334155;
  padding: 10px;
  margin: 5px 0;
  border-radius: 5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
  <div class="box">
    <h2>🔐 Vortex</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>
    <button onclick="mostrarCadastro()">Cadastrar</button>
  </div>
</div>

<!-- CADASTRO -->
<div class="container" id="cadastroBox" style="display:none;">
  <div class="box">
    <h2>📩 Cadastro</h2>

    <input type="email" id="newEmail" placeholder="Email">
    <input type="password" id="newSenha" placeholder="Criar senha">

    <button onclick="cadastrar()">Criar Conta</button>
  </div>
</div>

<!-- CURSO -->
<div class="curso" id="cursoBox">

<h1>🚀 VORTEX</h1>

<!-- MÓDULO 1 -->
<div class="modulo">
  <h3>📚 Fundamentos</h3>
  <button onclick="toggle('m1')">Abrir</button>

  <div id="m1" class="aulas">
    <div class="aula">Aula 1: Introdução + Atividade</div>
    <div class="aula">Aula 2: Sistemas + Atividade</div>
  </div>
</div>

<!-- MÓDULO 2 -->
<div class="modulo">
  <h3>🧠 Lógica</h3>
  <button onclick="toggle('m2')">Abrir</button>

  <div id="m2" class="aulas">
    <div class="aula">Aula 1: Variáveis + Atividade</div>
    <div class="aula">Aula 2: Condições + Atividade</div>
  </div>
</div>

<!-- MÓDULO 3 -->
<div class="modulo">
  <h3>🐍 Python</h3>
  <button onclick="toggle('m3')">Abrir</button>

  <div id="m3" class="aulas">
    <div class="aula">Aula 1: Código + Atividade</div>
    <div class="aula">Aula 2: Funções + Atividade</div>
  </div>
</div>

<button onclick="logout()">Sair</button>

</div>

<script>

function mostrarCadastro() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("cadastroBox").style.display = "flex";
}

function cadastrar() {
  let email = document.getElementById("newEmail").value;
  let senha = document.getElementById("newSenha").value;

  localStorage.setItem(email, senha);

  alert("Conta criada!");
  
  document.getElementById("cadastroBox").style.display = "none";
  document.getElementById("loginBox").style.display = "flex";
}

function login() {
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  let saved = localStorage.getItem(email);

  if (saved === senha) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("cursoBox").style.display = "block";
  } else {
    alert("Email ou senha incorretos");
  }
}

function toggle(id) {
  let el = document.getElementById(id);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

function logout() {
  location.reload();
}

</script>

</body>
</html>
